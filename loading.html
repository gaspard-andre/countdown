<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Loading...</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700;900&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --green: #00ff88;
    --green-dim: #00ff8840;
    --green-glow: #00ff8820;
    --bg: #020d06;
    --mid: #041a0c;
  }

  body {
    background: var(--bg);
    color: var(--green);
    font-family: 'Share Tech Mono', monospace;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }

  /* Scanlines */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(0, 255, 136, 0.015) 2px,
      rgba(0, 255, 136, 0.015) 4px
    );
    pointer-events: none;
    z-index: 10;
  }

  /* Vignette */
  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background: radial-gradient(ellipse at center, transparent 40%, rgba(0,0,0,0.85) 100%);
    pointer-events: none;
    z-index: 9;
  }

  .container {
    width: 680px;
    max-width: 95vw;
    position: relative;
    z-index: 1;
  }

  /* Header */
  .header {
    text-align: center;
    margin-bottom: 48px;
    animation: fadeIn 1s ease forwards;
  }

  .label {
    font-family: 'Share Tech Mono', monospace;
    font-size: 11px;
    letter-spacing: 6px;
    color: #00ff8880;
    margin-bottom: 12px;
    text-transform: uppercase;
  }

  .title {
    font-family: 'Orbitron', sans-serif;
    font-size: clamp(28px, 5vw, 44px);
    font-weight: 900;
    letter-spacing: 4px;
    color: var(--green);
    text-shadow: 0 0 30px #00ff8860, 0 0 60px #00ff8830;
    animation: pulse-glow 3s ease-in-out infinite;
  }

  @keyframes pulse-glow {
    0%, 100% { text-shadow: 0 0 30px #00ff8860, 0 0 60px #00ff8830; }
    50% { text-shadow: 0 0 50px #00ff88aa, 0 0 100px #00ff8860; }
  }

  /* Progress track */
  .progress-wrap {
    position: relative;
    margin-bottom: 20px;
  }

  .progress-track {
    width: 100%;
    height: 28px;
    background: var(--mid);
    border: 1px solid #00ff8830;
    position: relative;
    overflow: hidden;
    clip-path: polygon(0 0, calc(100% - 12px) 0, 100% 12px, 100% 100%, 12px 100%, 0 calc(100% - 12px));
  }

  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, #00ff8840, #00ff88cc);
    position: relative;
    transition: width 1s linear;
    clip-path: polygon(0 0, calc(100% - 6px) 0, 100% 6px, 100% 100%, 6px 100%, 0 calc(100% - 6px));
  }

  .progress-fill::after {
    content: '';
    position: absolute;
    top: 0; right: 0; bottom: 0;
    width: 40px;
    background: linear-gradient(90deg, transparent, #00ff88ff);
    filter: blur(4px);
  }

  /* Shimmer sweep */
  .progress-fill::before {
    content: '';
    position: absolute;
    top: 0; bottom: 0;
    width: 60px;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.15), transparent);
    animation: shimmer 2s linear infinite;
  }

  @keyframes shimmer {
    0% { left: -60px; }
    100% { left: 110%; }
  }

  /* Corner decorators */
  .track-corner {
    position: absolute;
    width: 8px; height: 8px;
    background: var(--green);
    opacity: 0.7;
  }
  .track-corner.tl { top: -1px; left: -1px; }
  .track-corner.br { bottom: -1px; right: -1px; }

  /* Tick marks */
  .ticks {
    display: flex;
    justify-content: space-between;
    padding: 0 2px;
    margin-top: 6px;
    opacity: 0.35;
    font-size: 9px;
    letter-spacing: 1px;
  }

  /* Percentage display */
  .percent-display {
    text-align: center;
    font-family: 'Orbitron', sans-serif;
    font-size: clamp(48px, 10vw, 80px);
    font-weight: 700;
    color: var(--green);
    text-shadow: 0 0 40px #00ff8880;
    letter-spacing: 2px;
    margin: 32px 0;
    line-height: 1;
  }

  .percent-display span {
    font-size: 0.45em;
    vertical-align: super;
    opacity: 0.7;
  }

  /* Stats row */
  .stats {
    display: grid;
    grid-template-columns: 1fr 1px 1fr 1px 1fr;
    gap: 0;
    border: 1px solid #00ff8820;
    margin-top: 36px;
    animation: fadeIn 1.5s ease forwards;
  }

  .stat {
    padding: 16px 12px;
    text-align: center;
  }

  .stat-divider {
    background: #00ff8820;
    align-self: stretch;
  }

  .stat-label {
    font-size: 9px;
    letter-spacing: 3px;
    color: #00ff8850;
    text-transform: uppercase;
    margin-bottom: 6px;
  }

  .stat-value {
    font-family: 'Orbitron', sans-serif;
    font-size: clamp(13px, 2.5vw, 17px);
    font-weight: 700;
    color: var(--green);
  }

  /* Date anchors */
  .dates {
    display: flex;
    justify-content: space-between;
    font-size: 10px;
    letter-spacing: 2px;
    color: #00ff8845;
    margin-top: 14px;
    padding: 0 2px;
  }

  /* Status line */
  .status-line {
    margin-top: 32px;
    font-size: 11px;
    letter-spacing: 2px;
    color: #00ff8855;
    text-align: center;
    height: 16px;
  }

  .cursor {
    display: inline-block;
    width: 8px;
    height: 12px;
    background: var(--green);
    margin-left: 4px;
    vertical-align: middle;
    animation: blink 1s step-end infinite;
  }

  @keyframes blink {
    0%, 100% { opacity: 1; }
    50% { opacity: 0; }
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* Done state */
  .done-flash {
    animation: done-pulse 0.5s ease 3;
  }

  @keyframes done-pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }
</style>
</head>
<body>

<div class="container">
  <div class="header">
    <div class="label">System Status</div>
    <div class="title">LOADING</div>
  </div>

  <div class="progress-wrap">
    <div class="progress-track">
      <div class="progress-fill" id="fill"></div>
      <div class="track-corner tl"></div>
      <div class="track-corner br"></div>
    </div>
    <div class="ticks">
      <span>0%</span><span>25%</span><span>50%</span><span>75%</span><span>100%</span>
    </div>
  </div>

  <div class="percent-display" id="pct">0<span>%</span></div>

  <div class="stats">
    <div class="stat">
      <div class="stat-label">Elapsed</div>
      <div class="stat-value" id="elapsed">—</div>
    </div>
    <div class="stat-divider"></div>
    <div class="stat">
      <div class="stat-label">Remaining</div>
      <div class="stat-value" id="remaining">—</div>
    </div>
    <div class="stat-divider"></div>
    <div class="stat">
      <div class="stat-label">ETA</div>
      <div class="stat-value" id="eta">—</div>
    </div>
  </div>

  <div class="dates">
    <span>FRI 27 FEB · 14:30</span>
    <span>SUN 08 MAR · 16:00</span>
  </div>

  <div class="status-line" id="status">
    <span id="status-text">INITIALISING</span><span class="cursor"></span>
  </div>
</div>

<script>
  const START = new Date('2026-02-27T14:30:00');
  const END   = new Date('2026-03-08T16:00:00');

  function fmt(ms) {
    if (ms <= 0) return '00:00:00';
    const s = Math.floor(ms / 1000);
    const d = Math.floor(s / 86400);
    const h = Math.floor((s % 86400) / 3600);
    const m = Math.floor((s % 3600) / 60);
    const sec = s % 60;
    if (d > 0) return `${d}d ${String(h).padStart(2,'0')}h`;
    return `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(sec).padStart(2,'0')}`;
  }

  function fmtETA(date) {
    return date.toLocaleString('en-GB', {
      month: 'short', day: 'numeric',
      hour: '2-digit', minute: '2-digit'
    });
  }

  const statuses = [
    'RUNNING CALCULATIONS',
    'PROCESSING SEQUENCE',
    'SYNCHRONISING DATA',
    'CALIBRATING OUTPUT',
    'VALIDATING PARAMETERS',
  ];
  let statusIdx = 0;

  function update() {
    const now  = Date.now();
    const total = END - START;
    const done  = now - START;
    const raw   = Math.max(0, Math.min(1, done / total));
    const pct   = (raw * 100).toFixed(2);

    document.getElementById('fill').style.width = pct + '%';
    document.getElementById('pct').innerHTML = Math.floor(raw * 100) + '<span>%</span>';

    const elapsed   = Math.max(0, now - START);
    const remaining = Math.max(0, END - now);

    document.getElementById('elapsed').textContent   = fmt(elapsed);
    document.getElementById('remaining').textContent = fmt(remaining);
    document.getElementById('eta').textContent       = fmtETA(END);

    if (raw >= 1) {
      document.getElementById('status-text').textContent = 'COMPLETE';
      document.getElementById('pct').classList.add('done-flash');
      return;
    }

    if (now < START) {
      document.getElementById('status-text').textContent = 'AWAITING START';
    }
  }

  // Rotate status messages
  setInterval(() => {
    statusIdx = (statusIdx + 1) % statuses.length;
    const el = document.getElementById('status-text');
    if (el.textContent !== 'COMPLETE' && el.textContent !== 'AWAITING START') {
      el.textContent = statuses[statusIdx];
    }
  }, 3200);

  update();
  setInterval(update, 1000);
</script>
</body>
</html>
