<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>If we meet for breakfast</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700;900&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --blue: #00cfff;
    --bg: #020d06;
    --mid: #041a0c;
  }

  body {
    background: var(--bg);
    color: var(--blue);
    font-family: 'Share Tech Mono', monospace;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    padding: 24px 16px;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: repeating-linear-gradient(
      0deg, transparent, transparent 2px,
      rgba(0,207,255,0.015) 2px, rgba(0,207,255,0.015) 4px
    );
    pointer-events: none;
    z-index: 10;
  }

  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background: radial-gradient(ellipse at center, transparent 40%, rgba(0,0,0,0.85) 100%);
    pointer-events: none;
    z-index: 9;
  }

  .container {
    width: 680px;
    max-width: 95vw;
    position: relative;
    z-index: 1;
  }

  .bar-header {
    display: flex;
    justify-content: flex-end;
    margin-bottom: 10px;
  }

  .bar-pct {
    font-family: 'Orbitron', sans-serif;
    font-size: 22px;
    font-weight: 700;
    color: var(--blue);
    text-shadow: 0 0 20px #00cfff60;
  }

  .progress-track {
    width: 100%;
    height: 24px;
    background: var(--mid);
    border: 1px solid #00cfff30;
    position: relative;
    overflow: hidden;
    clip-path: polygon(0 0, calc(100% - 10px) 0, 100% 10px, 100% 100%, 10px 100%, 0 calc(100% - 10px));
  }

  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, #00cfff40, #00cfffcc);
    position: relative;
    transition: width 1s linear;
    clip-path: polygon(0 0, calc(100% - 5px) 0, 100% 5px, 100% 100%, 5px 100%, 0 calc(100% - 5px));
  }

  .progress-fill::after {
    content: '';
    position: absolute;
    top: 0; right: 0; bottom: 0;
    width: 40px;
    background: linear-gradient(90deg, transparent, #00cfffff);
    filter: blur(4px);
  }

  .progress-fill::before {
    content: '';
    position: absolute;
    top: 0; bottom: 0;
    width: 60px;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.15), transparent);
    animation: shimmer 2s linear infinite;
  }

  @keyframes shimmer {
    0% { left: -60px; }
    100% { left: 110%; }
  }

  .ticks {
    display: flex;
    justify-content: space-between;
    padding: 0 2px;
    margin-top: 5px;
    opacity: 0.3;
    font-size: 9px;
    letter-spacing: 1px;
  }

  .stats {
    display: grid;
    grid-template-columns: 1fr 1px 1fr 1px 1fr;
    margin-top: 10px;
  }

  .stat { padding: 10px 8px; text-align: center; }
  .stat-divider { background: #00cfff20; align-self: stretch; }

  .stat-label {
    font-size: 8px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: #00cfff50;
    margin-bottom: 4px;
  }

  .stat-value {
    font-family: 'Orbitron', sans-serif;
    font-size: clamp(11px, 2vw, 14px);
    font-weight: 700;
    color: var(--blue);
  }

  .dates {
    display: flex;
    justify-content: space-between;
    font-size: 9px;
    letter-spacing: 2px;
    margin-top: 8px;
    padding: 0 2px;
    color: #00cfff40;
  }

  .status-line {
    margin-top: 24px;
    font-size: 11px;
    letter-spacing: 2px;
    color: #00cfff55;
    text-align: center;
  }

  .cursor {
    display: inline-block;
    width: 8px; height: 12px;
    background: var(--blue);
    margin-left: 4px;
    vertical-align: middle;
    animation: blink 1s step-end infinite;
  }

  @keyframes blink {
    0%, 100% { opacity: 1; }
    50% { opacity: 0; }
  }
</style>
</head>
<body>
<div class="container">

  <div class="bar-header">
    <div class="bar-pct" id="pct">0%</div>
  </div>

  <div class="progress-track">
    <div class="progress-fill" id="fill" style="width:0%"></div>
  </div>
  <div class="ticks"><span>0%</span><span>25%</span><span>50%</span><span>75%</span><span>100%</span></div>

  <div class="stats">
    <div class="stat">
      <div class="stat-label">Elapsed</div>
      <div class="stat-value" id="el">—</div>
    </div>
    <div class="stat-divider"></div>
    <div class="stat">
      <div class="stat-label">Remaining</div>
      <div class="stat-value" id="rem">—</div>
    </div>
    <div class="stat-divider"></div>
    <div class="stat">
      <div class="stat-label">ETA</div>
      <div class="stat-value" id="eta">—</div>
    </div>
  </div>

  <div class="dates">
    <span>FRI 27 FEB · 14:30</span>
    <span>SUN 08 MAR · 11:00</span>
  </div>

  <div class="status-line">
    <span id="status-text">SYNCHRONISING</span><span class="cursor"></span>
  </div>

</div>

<script>
  const START = new Date('2026-02-27T14:30:00');
  const END   = new Date('2026-03-08T11:00:00');

  function fmt(ms) {
    if (ms <= 0) return 'DONE';
    const s = Math.floor(ms / 1000);
    const d = Math.floor(s / 86400);
    const h = Math.floor((s % 86400) / 3600);
    const m = Math.floor((s % 3600) / 60);
    const sec = s % 60;
    if (d > 0) return `${d}d ${String(h).padStart(2,'0')}h`;
    return `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(sec).padStart(2,'0')}`;
  }

  function fmtETA(date) {
    return date.toLocaleString('en-GB', { month:'short', day:'numeric', hour:'2-digit', minute:'2-digit' });
  }

  function update() {
    const now   = Date.now();
    const total = END - START;
    const raw   = Math.max(0, Math.min(1, (now - START) / total));

    document.getElementById('fill').style.width = (raw * 100).toFixed(2) + '%';
    document.getElementById('pct').textContent  = Math.floor(raw * 100) + '%';
    document.getElementById('el').textContent   = fmt(Math.max(0, now - START));
    document.getElementById('rem').textContent  = fmt(Math.max(0, END - now));
    document.getElementById('eta').textContent  = fmtETA(END);

    if (raw >= 1) document.getElementById('status-text').textContent = 'COMPLETE';
  }

  const statuses = ['SYNCHRONISING','PROCESSING','CALIBRATING','VALIDATING','RUNNING'];
  let si = 0;
  setInterval(() => {
    si = (si + 1) % statuses.length;
    const el = document.getElementById('status-text');
    if (el.textContent !== 'COMPLETE') el.textContent = statuses[si];
  }, 3000);

  update();
  setInterval(update, 1000);
</script>
</body>
</html>
